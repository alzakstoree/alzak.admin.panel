<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family: Arial;
margin:0;
display:flex;
background:#f5f5f5;
}

.sidebar{
width:250px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
background:#334155;
color:white;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#475569;
}

.content{
flex:1;
padding:20px;
overflow:auto;
}

.stat-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.add-btn{
padding:10px 15px;
margin-bottom:15px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.add-btn:hover{
background:#1d4ed8;
}

</style>

</head>


<body>

<div class="sidebar">

<h2>لوحة التحكم</h2>

<button onclick="loadSection('dashboard')">لوحة القيادة</button>
<button onclick="loadSection('users')">المستخدمين</button>
<button onclick="loadSection('orders')">الطلبات</button>
<button onclick="loadSection('charges')">طلبات الشحن</button>
<button onclick="loadSection('paymentMethods')">طرق الدفع</button>
<button onclick="loadSection('currencies')">العملات</button>
<button onclick="loadSection('vipProfit')">نسبة VIP</button>
<button onclick="loadSection('profitLog')">الأرباح</button>
<button onclick="loadSection('maintenance')">الصيانة</button>

</div>


<div class="content">

<div id="contentArea">
<p style="text-align:center;">جاري تحميل لوحة القيادة...</p>
</div>

</div>


<!-- تحميل ملفات Airtable -->
<script src="js/airtable-config.js"></script>
<script src="js/airtable-service.js"></script>

<!-- لوحة التحكم -->
<script src="js/admin.js"></script>


<script>

document.addEventListener("DOMContentLoaded",function(){

if(typeof loadSection === "function"){
loadSection("dashboard");
}else{
console.error("admin.js لم يتم تحميله");
}

});

</script>

</body>
</html>
